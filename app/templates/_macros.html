{# Аватар пользователя: фото, если загружено, иначе кружок с буквой #}
{% macro avatar(user, extra='') -%}
{%- if user and user.has_avatar -%}
  <img class="avatar {{ extra }}" src="{{ url_for('main.user_avatar', user_id=user.id) }}" alt="{{ user.username }}">
{%- else -%}
  <div class="avatar {{ extra }}">{{ (user.username[0]|upper) if user else '?' }}</div>
{%- endif -%}
{%- endmacro %}
